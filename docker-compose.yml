name: paperseek

services:
  web:
    build:
      context: .
    image: paperseek:latest
    ports:
      - "${PAPERSEEK_PORT:-8765}:${PAPERSEEK_CONTAINER_PORT:-7860}"
    restart: unless-stopped
    environment:
      PORT: ${PAPERSEEK_CONTAINER_PORT:-7860}
      DATA_SOURCE: ${DATA_SOURCE:-openalex}
      WOS_API_KEY: ${WOS_API_KEY:-}
      WOS_DB: ${WOS_DB:-WOS}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
      CROSSREF_EMAIL: ${CROSSREF_EMAIL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_TYPE: ${LLM_API_TYPE:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      SEARCH_FIELD: ${SEARCH_FIELD:-}
      DISCIPLINE_FIELDS: ${DISCIPLINE_FIELDS:-}
      TARGET_MIN: ${TARGET_MIN:-5}
      TARGET_MAX: ${TARGET_MAX:-50}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-5}
      EXPAND_CITATIONS: ${EXPAND_CITATIONS:-true}
      FETCH_ABSTRACTS: ${FETCH_ABSTRACTS:-false}
      CITATION_SEED_COUNT: ${CITATION_SEED_COUNT:-3}
      CITATION_PER_SEED: ${CITATION_PER_SEED:-4}
      CITATION_MAX_RECORDS: ${CITATION_MAX_RECORDS:-40}
